name: Refresh eBay catalog cache

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Verify eBay API connectivity
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_USER_REFRESH_TOKEN: ${{ secrets.EBAY_USER_REFRESH_TOKEN }}
          EBAY_ENVIRONMENT: ${{ secrets.EBAY_ENVIRONMENT || 'production' }}
        run: |
          npx tsx -e "
          import { EbayTradingClient, loadEbayConfigFromEnv } from './lib/ebay/client.ts';
          (async () => {
            const client = new EbayTradingClient(loadEbayConfigFromEnv());
            const page = await client.getActiveListings(1, 5);
            console.log('Active listings:', page.total);
          })();
          "

      - name: Refresh sitemap
        run: npm run sync:ebay:sitemap

      - name: Commit sitemap if changed
        run: |
          if git diff --quiet; then
            echo "No sitemap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git commit -m "chore: refresh sitemap"
          git push
