name: Sync eBay Inventory

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Sync inventory from eBay
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_USER_REFRESH_TOKEN: ${{ secrets.EBAY_USER_REFRESH_TOKEN }}
          EBAY_ENVIRONMENT: ${{ secrets.EBAY_ENVIRONMENT || 'production' }}
        run: npm run sync:ebay

      - name: Commit and push if inventory changed
        run: |
          if git diff --quiet; then
            echo "No inventory changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/inventory.json public/sitemap.xml
          git commit -m "chore: sync inventory from eBay"
          git push
